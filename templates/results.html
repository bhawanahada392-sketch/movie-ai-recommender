{% extends "base.html" %}
{% block title %}CineMate AI | Results{% endblock %}
{% block page_id %}results{% endblock %}

{% block content %}
<section class="page-panel results-panel">
    <div class="page-intro">
        <p class="section-eyebrow">Your curated watchlist</p>
        <h1 class="page-title">Movie results</h1>
        <p class="page-description">A calm, story-led collection of films chosen from your search.</p>
    </div>

    <form class="search-form search-form--compact" action="{{ url_for('results_page') }}" method="get" role="search">
        <label for="results-search" class="visually-hidden">Search for movies</label>
        <div class="search-bar">
            <div class="search-input-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M16.5 16.5 21 21"></path>
                </svg>
                <input type="search" id="results-search" name="q" placeholder="Search a movie, genre, actor, or describe your mood..." autocomplete="off" value="{{ query or '' }}">
            </div>
            <button type="submit" class="search-btn">
                <span class="btn-text">🍿 Discover Movies</span>
            </button>
        </div>
    </form>

    <div id="results-stage" class="results-stage" aria-live="polite"></div>
</section>
{% endblock %}
